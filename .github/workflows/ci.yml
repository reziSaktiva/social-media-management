# Quality gates — CI-D01 / CI-D02 (cicd-pipeline.md)
# PR → staging | main. Deploy remains on Railway (CI-D04).
# No production secrets required (CI-D06).

name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy URLs for prisma generate / validate only (CI-D06)
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      SKIP_ENV_VALIDATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate
        working-directory: apps/web
        run: bunx prisma generate

      - name: Prisma validate
        working-directory: apps/web
        run: bunx prisma validate

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
